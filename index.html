<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Store Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        header { background: #111; color: white; padding: 15px; text-align: center; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid #ccc; }
        .shopee { border-top-color: #ee4d2d; }
        .tiktok { border-top-color: #000000; }
        .status { font-size: 12px; background: #eee; padding: 4px 10px; border-radius: 10px; font-weight: bold; }
        .btn { display: block; width: 100%; padding: 10px; margin-top: 10px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; text-align: center; border: none; }
    </style>
</head>
<body>
    <header>
        <h3>My Shop Manager</h3>
    </header>
    <div class="container">
        <div class="card shopee">
            <h2>Shopee</h2>
            <span class="status">Status: Application Pending</span>
            <p>Dito lalabas ang mga products mo kapag approved na ang API.</p>
        </div>
        
        <div class="card tiktok">
            <h2>TikTok Shop</h2>
            <span class="status">Status: Setting up Market</span>
            <p>Inventory sync at order management.</p>
        </div>
    </div>
</body>
</html>
